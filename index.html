<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>당근마켓 스타일 커뮤니티</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="/" class="logo" onclick="routeTo(event, '/')">🥕 당근커뮤니티</a>
        </div>
    </header>

    <div id="app">
        <section class="hero-banner">
            <div class="container">
                <h1>우리 동네의<br>모든 소식을 한눈에!</h1>
                <p>이웃과 나누는 따뜻한 이야기</p>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <h2 class="section-title">🔥 지금 인기 있는 글</h2>
                <div id="trending-posts" class="card-grid"></div>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <h2 class="section-title">🏘️ 실시간 동네 소식</h2>
                <div id="recent-posts" class="card-grid"></div>
            </div>
        </section>
    </div>

    <footer class="footer">
        <div class="container">
            <p>© 2026 Orange Community. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/app.js"></script>
</body>
</html>
