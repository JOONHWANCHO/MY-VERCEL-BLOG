<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노리야 키즈 | 동네 액티비티 총집합</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="container navbar-content">
            <a href="/" class="logo" onclick="routeTo(event, '/')">⚡ NORIYA <span class="logo-sub">kids</span></a>
            <div class="header-search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="main-search-input" placeholder="어디로 아이와 함께 떠날까요? (지역, 장소 검색)" oninput="handleSearch(this.value)">
            </div>
        </div>
    </header>

    <div id="app">
        <section class="hero-banner">
            <div class="container hero-content">
                <div class="hero-text">
                    <span class="badge-accent">초특가 노리야 주말특가</span>
                    <h1>이번 주말 아이 액티비티<br><span class="highlight">최저가 예약</span></h1>
                </div>
                <div class="hero-badge-img">🎁</div>
            </div>
            <!-- <div id="top-banner-carousel"></div> -->
        </section>

        <section class="container" id="stamp-container"></section>

        <section class="container category-section">
            <div class="category-grid">
                <div class="category-item" onclick="routeTo(event, '/category/인기')">
                    <div class="category-icon-wrap" style="background-color: #fff0f6;">🎠</div>
                    <span>인기 핫플</span>
                </div>
                <div class="category-item" onclick="routeTo(event, '/category/최신')">
                    <div class="category-icon-wrap" style="background-color: #e6f7ff;">🏊</div>
                    <span>신규 등록</span>
                </div>
                <div class="category-item" onclick="routeTo(event, '/category/자연')">
                    <div class="category-icon-wrap" style="background-color: #f6ffed;">🌳</div>
                    <span>자연/체험</span>
                </div>
                <div class="category-item" onclick="routeTo(event, '/category/클래스')">
                    <div class="category-icon-wrap" style="background-color: #fff7e6;">🎨</div>
                    <span>원데이클래스</span>
                </div>
                <div class="category-item" onclick="routeTo(event, '/category/전시')">
                    <div class="category-icon-wrap" style="background-color: #feebec;">🦕</div>
                    <span>박물관/전시</span>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="section-title-wrap">
                    <h2 class="section-title">🔥 실시간 예약 급상승 액티비티</h2>
                    <span class="section-desc">지금 가장 많은 부모들이 선택하고 있어요</span>
                </div>
                <div id="trending-posts" class="card-grid"></div>
            </div>
        </section>

        <section class="promo-banner-section">
            <div class="container">
                <div class="promo-banner">
                    <div>🎉 <b>첫 결제 시 10,000원 즉시 할인 쿠폰</b>팩 발급 중!</div>
                    <div class="promo-go">받으러 가기 ➡️</div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="section-title-wrap">
                    <h2 class="section-title">✨ 새로 등록된 동네 오픈 특가</h2>
                    <span class="section-desc">놓치면 후회하는 신규 라인업</span>
                </div>
                <div id="recent-posts" class="card-grid"></div>
            </div>
        </section>
    </div>

    <nav class="bottom-nav">
        <div class="bottom-nav-item" onclick="routeTo(event, '/')">
            <div class="nav-icon">🏠</div>
            <span>홈</span>
        </div>
        <div class="bottom-nav-item" onclick="routeTo(event, '/wishes')">
            <div class="nav-icon">❤️</div>
            <span>찜 목록</span>
        </div>
    </nav>

    <footer class="footer" style="padding-bottom: 90px;">
        <div class="container">
            <p>(주)노리야키즈랩 | 서울시 강남구 테헤란로</p>
            <p>© 2026 NORIYA kids. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/app.js"></script>
</body>
</html>
